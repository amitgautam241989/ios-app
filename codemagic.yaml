workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.epms.com"
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Capacitor iOS
        script: |
          npm install @capacitor/ios

      - name: Add iOS Platform
        script: |
          npx cap add ios || true

      - name: Fix Deployment Target in Podfile BEFORE sync
        script: |
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '14.0'/" ios/App/Podfile
          # Also patch capacitor.config if needed
          cat ios/App/Podfile | grep platform

      - name: Fix Capacitor Permissions
        script: |
          chmod +x ./node_modules/.bin/cap

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install --repo-update

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa