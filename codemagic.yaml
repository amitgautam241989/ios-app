workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.epms.com"
    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Print Podfile for debug
        script: |
          echo "===== Podfile Content ====="
          cat ios/App/Podfile
          echo "==========================="

      - name: Force set iOS deployment target
        script: |
          sed -i '' "s/^platform :ios.*/platform :ios, '14.0'/" ios/App/Podfile
          echo "===== Updated Podfile ====="
          cat ios/App/Podfile
          echo "==========================="

      - name: Fix Capacitor CLI permissions
        script: |
          chmod +x ./node_modules/.bin/cap

      - name: Capacitor sync (skip pod install)
        script: |
          npx cap sync ios --no-deps

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install --repo-update

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa