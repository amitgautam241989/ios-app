workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "com.epms.com"
    scripts:
      - name: Install Node dependencies
        script: |
          npm install

      - name: Fix Capacitor CLI permissions
        script: |
          chmod +x ./node_modules/.bin/cap

      - name: Capacitor sync iOS
        script: |
          npx cap sync ios

      - name: Find xcworkspace path
        script: |
          echo "===== Searching for xcworkspace ====="
          find . -name "*.xcworkspace" -not -path "*/node_modules/*"
          echo "===== Searching for xcodeproj ====="
          find . -name "*.xcodeproj" -not -path "*/node_modules/*"
          echo "===== iOS folder structure ====="
          ls -la ios/
          ls -la ios/App/
          echo "================================"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa